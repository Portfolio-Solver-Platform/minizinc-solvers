name: Publish Docker image

on:
  push:
    branches: [ main ]

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  push:
    needs: ci

    permissions:
      contents: read
      packages: write

    uses: Portfolio-Solver-Platform/infrastructure/.github/workflows/push-image.yaml@8e77fb9b4cbcee0182ce58eb20846c108b561728 # main
    with:
      image_name: minizinc-solvers
